name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Build x86_64 release
      run: cargo build --release

    - name: Rename binaries
      run: |
        mkdir -p release
        cp target/x86_64-unknown-linux-gnu/release/kpasswd release/kpasswd-x86_64-linux

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/kpasswd-x86_64-linux
        draft: false
        prerelease: false

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            artifact: kpasswd-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: kpasswd-arm64-linux

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Build release
      env:
        OPENSSL_STATIC: "1"
      run: cargo build --release

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact }}
        path: target/release/kpasswd

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Prepare release files
      run: |
        mkdir release
        mv artifacts/kpasswd-x86_64-linux/kpasswd release/kpasswd-x86_64-linux
        mv artifacts/kpasswd-arm64-linux/kpasswd release/kpasswd-arm64-linux
        chmod +x release/*

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release create "${{ github.ref_name }}" release/* --generate-notes --repo "${{ github.repository }}"
